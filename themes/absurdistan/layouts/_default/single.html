{{ define "main" }}
<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <span class="post-date">{{ .Date.Format "02 Jan 2006" }}</span>
      {{ if .Params.tags }}
      <div class="post-tags-inline">
        {{ range .Params.tags }}
        <a href="{{ printf "tags/%s/" (. | urlize) | relURL }}" class="tag-pill">{{ . }}</a>
        {{ end }}
      </div>
      {{ end }}
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ if .Params.tags }}
  <footer class="post-footer">
    <p class="post-footer-label">Filed under</p>
    <div class="post-footer-tags">
      {{ range .Params.tags }}
      <a href="{{ printf "tags/%s/" (. | urlize) | relURL }}" class="tag-pill">{{ . }}</a>
      {{ end }}
    </div>
  </footer>
  {{ end }}

  <a href="{{ site.Home.RelPermalink }}" class="back-link">All posts</a>
</article>
{{ end }}
